name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore comet.slnx

      - name: Build
        run: dotnet build comet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test comet.slnx --configuration Release --no-build --verbosity normal
