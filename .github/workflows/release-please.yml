name: Release

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - comet.slnx
      - .github/workflows/release-please.yml
      - .github/workflows/release-artifacts.yml
      - release-please-config.json
      - .release-please-manifest.json

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore comet.slnx

      - name: Build
        run: dotnet build comet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test comet.slnx --configuration Release --no-build --verbosity normal

  release-please:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true
