name: Release

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - comet.slnx
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  release:
    name: Build, test, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore comet.slnx

      - name: Build
        run: dotnet build comet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test comet.slnx --configuration Release --no-build --verbosity normal

      - name: Calculate version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$latest_tag" ]; then
            current_version="0.0.0"
            range="HEAD"
          else
            current_version="${latest_tag#v}"
            range="${latest_tag}..HEAD"
          fi

          commits=$(git log --format=%B $range)

          bump="none"
          if echo "$commits" | grep -Eq '(^|\n)BREAKING CHANGE:|^[a-zA-Z]+(\([^)]+\))?!:'; then
            bump="major"
          elif echo "$commits" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          elif echo "$commits" | grep -Eq '^(fix|perf)(\([^)]+\))?:'; then
            bump="patch"
          fi

          if [ "$bump" = "none" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable Conventional Commits found."
            exit 0
          fi

          IFS='.' read -r major minor patch <<< "$current_version"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="$major.$minor.$patch"
          next_tag="v$next_version"

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Publish comet.exe
        if: steps.version.outputs.release == 'true'
        shell: bash
        run: |
          dotnet publish src/comet/comet.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            --output artifacts/publish/win-x64 \
            -p:PublishSingleFile=true \
            -p:AssemblyName=comet \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.version }} \
            -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Package artifact
        if: steps.version.outputs.release == 'true'
        shell: bash
        run: |
          mkdir -p artifacts/package
          cp artifacts/publish/win-x64/comet.exe artifacts/package/comet.exe
          cp README.md artifacts/package/README.md
          cp LICENSE artifacts/package/LICENSE
          cd artifacts/package
          zip -r "../comet-win-x64-${{ steps.version.outputs.tag }}.zip" .

      - name: Upload release asset
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "artifacts/comet-win-x64-${{ steps.version.outputs.tag }}.zip" \
            --clobber